<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flajp | Bio</title>
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* Zabezpiecza przed pojawieniem się paska przewijania od śniegu */
        }

        /* Efekt spadającego śniegu w CSS */
        .snow-bg {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(255, 255, 255, 0.3) 1px, transparent 1px),
                radial-gradient(circle at 85% 30%, rgba(255, 255, 255, 0.4) 1.5px, transparent 1.5px),
                radial-gradient(circle at 50% 80%, rgba(255, 255, 255, 0.2) 2px, transparent 2px),
                radial-gradient(circle at 20% 90%, rgba(255, 255, 255, 0.5) 1px, transparent 1px),
                radial-gradient(circle at 70% 10%, rgba(255, 255, 255, 0.3) 1.5px, transparent 1.5px);
            background-size: 80px 80px;
            animation: snowFall 20s linear infinite;
            z-index: -1; 
        }

        @keyframes snowFall {
            0% { transform: translateY(0); }
            100% { transform: translateY(50%); }
        }

        .profile-card {
            text-align: center;
            border: 2px solid #ffffff;
            padding: 40px;
            border-radius: 12px;
            width: 300px;
            background-color: #050505; /* Tło pod kartą, żeby śnieg znikał z tyłu */
            box-shadow: 8px 8px 0px #ffffff;
            z-index: 1;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid #ffffff;
            margin-bottom: 15px;
            background-color: #222;
            object-fit: cover;
        }

        h1 { 
            margin: 0; 
            font-size: 24px;
            letter-spacing: 2px;
        }
        
        p { 
            margin: 10px 0 25px 0; 
            color: #aaaaaa; 
            font-size: 14px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-btn {
            text-decoration: none;
            color: #000000;
            background-color: #ffffff;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 13px;
        }

        .link-btn:hover {
            background-color: #050505;
            color: #ffffff;
            border: 2px solid #ffffff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.4); /* Nowy efekt poświaty */
        }
    </style>
</head>
<body>
    
    <div class="snow-bg"></div>

    <div class="profile-card">
        <img src="https://i.postimg.cc/ncpKt4gP/file-00000000da88720a98c78e4a3f1647e8.png" alt="Logo flajp" class="avatar">
        
        <h1>flajp</h1>
        <p>JS Developer & Graphic Designer</p>
        
        <div class="links">
           <a href="#" onclick="event.preventDefault(); this.textContent='SOON...'; setTimeout(() => this.textContent='Portfolio', 2000);" class="link-btn">Portfolio</a>
            <a href="https://t.me/flajpik" target="_blank" class="link-btn">Telegram</a>
            <a href="https://discord.gg/ne0nstore" target="_blank" class="link-btn">Discord</a>
        </div>
    </div>

</body>
</html>
